<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><link rel="stylesheet" href="settings.css"><link rel="stylesheet" href="settings-extra.css"><title>Webcam Overlay 設定</title></head>
<body><main><h1>Webcam Overlay</h1><p class="lead">雙攝影機浮動顯示工具</p><section><h2>攝影機來源</h2><p class="hint">第一次偵測時，Windows 可能會詢問攝影機權限。</p><div class="grid"><label>來源 1<select id="source1"></select></label><label>來源 2<select id="source2"></select></label></div><div class="actions"><button id="detect">重新偵測</button><button id="save" class="primary">套用來源</button></div><p id="status"></p></section><section><h2>顯示狀態</h2><div class="modes"><button data-mode="0">隱藏</button><button data-mode="1">顯示 1 個</button><button data-mode="2">顯示 2 個</button></div></section>
<section><h2>畫面與背景</h2><div class="grid"><label>外形<select id="shape"><option value="rectangle">矩形</option><option value="rounded">圓角矩形</option><option value="circle">圓形</option></select></label><label>背景處理<select id="background"><option value="original">原有背景</option><option value="blur">背景模糊</option><option value="remove">人物去背</option></select></label><label>框線顏色<div class="colorChoices"><button type="button" class="colorSwatch" data-color="#ffffff" title="白色"></button><button type="button" class="colorSwatch" data-color="#000000" title="黑色"></button><button type="button" class="colorSwatch" data-color="#2463dc" title="藍色"></button><span>自訂</span><input id="borderColor" type="color"></div></label><label>框線粗細<input id="borderWidth" type="range" min="0" max="20" value="5"><output id="borderWidthOut">5px</output></label><label>圓角大小<input id="radius" type="range" min="0" max="80" value="20"><output id="radiusOut">20px</output></label><label>模糊程度<input id="blur" type="range" min="4" max="30"><output id="blurOut"></output></label><label class="check"><input id="mirror" type="checkbox"> 水平鏡像</label><label class="check"><input id="shadow" type="checkbox"> 顯示陰影</label></div><p class="hint">設定會即時套用。背景模糊與去背首次切換可能稍候數秒。</p></section>
<section><h2>自訂快速鍵</h2><p class="hint">點選按鍵方塊，再直接按下想使用的快速鍵組合。</p><div class="grid"><label>循環顯示<div class="hotkeyCapture" id="hkCycle" tabindex="0"></div></label><label>隱藏全部<div class="hotkeyCapture" id="hkHide" tabindex="0"></div></label><label>顯示 1 個<div class="hotkeyCapture" id="hkOne" tabindex="0"></div></label><label>顯示 2 個<div class="hotkeyCapture" id="hkTwo" tabindex="0"></div></label><label>切換／交換來源<div class="hotkeyCapture" id="hkSwap" tabindex="0"></div></label></div><div class="actions"><button id="saveHotkeys" class="primary">儲存快速鍵</button></div><p id="hotkeyStatus" class="hint"></p></section>
<section><h2>操作方式</h2><div class="help"><span>拖曳</span><b>移動攝影機視窗</b><span>滾輪</span><b>縮放視窗</b><span>單畫面點擊</span><b>切換來源</b><span>雙畫面點擊</span><b>交換兩個來源</b></div><p class="keys">快速鍵：Ctrl + Alt + C 循環狀態　／　Ctrl + Alt + 0、1、2 直接切換　／　Ctrl + Alt + S 交換來源</p></section><footer><button type="button" id="developerLink">述文老師學習網開發　https://harmonica80.blogspot.com/</button></footer></main><script src="settings.js"></script></body></html>
